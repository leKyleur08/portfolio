<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">Mon Portfolio</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html#accueil">Accueil</a></li>
                <li><a href="index.html#projets">Projets</a></li>
                <li><a href="index.html#apropos">À propos</a></li>
                <li><a href="#" class="btn-nav">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="contact" class="contact-section">
        <h2>Me Contacter</h2>
        <p>Un projet, une question ou une opportunité d'alternance/emploi ? Écrivez-moi !</p>
        
        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">

            <input type="hidden" name="access_key" value="a1d6b00b-8c9f-468b-80db-aa47bf23377c">

            <div class="form-group">
                <input type="text" name="name" placeholder="Votre nom" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Votre adresse email" required>
            </div>
            <div class="form-group">
                <textarea name="message" rows="5" placeholder="Votre message" required></textarea>
            </div>
            <button type="submit" class="submit-button">
                Envoyer le message <i class="fa-regular fa-paper-plane" style="margin-left: 8px;"></i>
            </button>

            <!-- <input type="hidden" name="redirect" value="https://web3forms.com/success"> -->
            <input type="hidden" name="apikey" value="a1d6b00b-8c9f-468b-80db-aa47bf23377c">
        </form>
    </section>
    
</body>
