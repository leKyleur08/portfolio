<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">Mon Portfolio</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html#accueil">Accueil</a></li>
                <li><a href="index.html#projets">Projets</a></li>
                <li><a href="index.html#apropos">À propos</a></li>
                <li><a href="#" class="btn-nav">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="contact" class="contact-section">
        <h2>Me Contacter</h2>
        <p>Un projet, une question ou une opportunité d'alternance/emploi ? Écrivez-moi !</p>
        
        <form action="https://api.web3forms.com/submit" method="POST">

            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">

            <input type="text" name="name" required>
            <input type="email" name="email" required>
            <textarea name="message" required></textarea>
            <input type="hidden" name="redirect" value="https://web3forms.com/success">
            <button type="submit">Submit Form</button>

        </form>
    </section>
    
</body>
