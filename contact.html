<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<script>
function preparerRedirection() {
    // 1. On récupère ce qui est écrit dans la case "Votre nom"
    const nomSaisi = document.querySelector('input[name="name"]').value;
    
    // 2. Si la case n'est pas vide, on l'ajoute magiquement à la redirection
    if(nomSaisi) {
        const redirectInput = document.querySelector('input[name="redirect"]');
        redirectInput.value = "https://leKyleur08.github.io/portfolio/merci.html?name=" + encodeURIComponent(nomSaisi);
    }
}
</script>
<body>

    <header class="navbar">
        <div class="logo">Mon Portfolio</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html#accueil">Accueil</a></li>
                <li><a href="index.html#projets">Projets</a></li>
                <li><a href="index.html#apropos">À propos</a></li>
                <li><a href="#" class="btn-nav">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="contact" class="contact-section">
        <h2>Me Contacter</h2>
        <p>Un projet, une question ou une opportunité d'alternance/emploi ? Écris-moi !</p>
        
        <!-- Bloc des coordonnées directes (Mail et Téléphone cliquables) -->
        <div class="contact-direct">
            <a href="mailto:matthew.hubert1908@gmail.com" class="contact-item">
                <i class="fa-solid fa-envelope"></i> matthew.hubert1908@gmail.com
            </a>
            <a href="tel:+33768606946" class="contact-item">
                <i class="fa-solid fa-phone"></i> 07 68 60 69 46
            </a>
        </div>

        <!-- Ton formulaire existant (avec le script de la solution précédente) -->
        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="a1d6b00b-8c9f-468b-80db-aa47bf23377c">
            
    
            <div class="form-group">
                <input type="text" name="name" placeholder="Votre nom" autocomplete="off" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Votre adresse email" autocomplete="off" required>
            </div>
            <div class="form-group">
                <textarea name="message" rows="5" placeholder="Votre message" autocomplete="off" required></textarea>
            </div>
            <button type="submit" class="submit-button" id="submitBtn" onclick="preparerRedirection()">Envoyer</button>
            <input type="hidden" name="redirect" value="https://lekyleur08.github.io/portfolio/merci.html">
        </form>
    </section>

    <!-- Pied de page (Footer avec réseaux sociaux) -->
    <footer>
        <div class="footer-socials">
            <!-- target="_blank" permet d'ouvrir le lien dans un nouvel onglet -->
            <a href="https://linkedin.com/in/MatthewHubert" target="_blank" aria-label="LinkedIn" class="social-icon li"><i class="fa-brands fa-linkedin-in"></i></a>
            <a href="https://github.com/leKyleur08" target="_blank" aria-label="GitHub" class="social-icon gh"><i class="fa-brands fa-github"></i></a>
            <a href="https://instagram.com/leKyleur08" target="_blank" aria-label="Instagram" class="social-icon ig"><i class="fa-brands fa-instagram"></i></a>
        </div>
        <p>&copy; 2026 Matthew Hubert. Tous droits réservés.</p>
    </footer>
    
</body>
