<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Merci !</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .merci-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }
        .merci-btn {
            margin-top: 20px;
            background-color: #4f46e5;
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="merci-container">
        <h1>🚀 Message bien reçu !</h1>
        <p>Merci <span id="user-name" style="font-weight: 700; color: #4f46e5;"></span>, je te réponds dans les plus brefs délais.</p>
        <a href="index.html" class="merci-btn">Retour au portfolio</a>
    </div>

    <script>
        // 1. On cherche les paramètres dans l'URL (ex: ?name=Matthew)
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        
        // 2. Si on trouve un nom, on l'affiche, sinon on met "à toi" par défaut
        if (name && name.trim() !== "" && name !== "{name}") {
            document.getElementById('user-name').textContent = decodeURIComponent(name);
        } else {
            document.getElementById('user-name').textContent = "à toi";
        }
    </script>

</body>
</html>
