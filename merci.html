<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Merci !</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .merci-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }
        .merci-btn {
            margin-top: 20px;
            background-color: #4f46e5;
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="merci-container">
        <h1>🚀 Message bien reçu !</h1>
        <!-- Le texte s'adaptera si un nom est trouvé, sinon il dira juste "Merci" -->
        <p id="merci-texte">Merci, je te réponds dans les plus brefs délais.</p>
        <a href="index.html" class="merci-btn">Retour au portfolio</a>
    </div>

    <script>
        // 1. On récupère les paramètres de l'URL (?name=MonPrenom...)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name'); // Correspond au name="name" de l'input

        // 2. Si un nom existe et n'est pas vide, on personnalise le message
        if (name && name.trim() !== "") {
            const texteElement = document.getElementById('merci-texte');
            texteElement.innerHTML = `Merci <span style="font-weight: 700; color: #4f46e5;">${decodeURIComponent(name)}</span>, je te réponds dans les plus brefs délais.`;
        }
    </script>

</body>
</html>
